{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <nav id="site-nav" class="apple-nav" aria-label="Main navigation">
      <a class="apple-nav__brand" href="{{ base_path }}/">Ping-Ju Lin's Homepage</a>
      <div class="apple-nav__links">
        {% for link in site.data.navigation.main %}
          {% if link.url contains 'http' %}
            {% assign domain = '' %}
            {% else %}
            {% assign domain = base_path %}
          {% endif %}
          <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
        {% endfor %}
        <button type="button" class="site-control site-control--theme" data-theme-toggle aria-label="Switch black and white theme">Dark</button>
      </div>
    </nav>
  </div>
</div>
