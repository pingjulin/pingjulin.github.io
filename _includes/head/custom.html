{% include base_path %}

<!-- start custom head snippets -->

<link rel="icon" href="{{ base_path }}/images/favicon.ico">
<link rel="shortcut icon" href="{{ base_path }}/images/favicon.ico">
<link rel="apple-touch-icon" href="{{ base_path }}/images/site-logo.png">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-TileImage" content="{{ base_path }}/images/site-logo.png">
<meta name="msapplication-config" content="{{ base_path }}/images/browserconfig.xml">
<meta name="theme-color" content="#ffffff">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<script>
  (function() {
    var theme = localStorage.getItem("site-theme") || "light";
    document.documentElement.setAttribute("data-theme", theme);
  })();

  document.addEventListener("DOMContentLoaded", function() {
    var root = document.documentElement;
    var themeButton = document.querySelector("[data-theme-toggle]");

    function syncButtons() {
      var theme = root.getAttribute("data-theme") || "light";
      if (themeButton) themeButton.textContent = theme === "dark" ? "Light" : "Dark";
    }

    if (themeButton) {
      themeButton.addEventListener("click", function() {
        var nextTheme = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", nextTheme);
        localStorage.setItem("site-theme", nextTheme);
        syncButtons();
      });
    }

    syncButtons();
  });
</script>

<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- end custom head snippets -->
