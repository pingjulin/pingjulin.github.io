{% include base_path %}

<!-- start custom head snippets -->

<link rel="icon" href="{{ base_path }}/images/favicon.ico">
<link rel="shortcut icon" href="{{ base_path }}/images/favicon.ico">
<link rel="apple-touch-icon" href="{{ base_path }}/images/site-logo.png">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-TileImage" content="{{ base_path }}/images/site-logo.png">
<meta name="msapplication-config" content="{{ base_path }}/images/browserconfig.xml">
<meta name="theme-color" content="#ffffff">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<style>
  :root {
    --site-bg: #fbfbfd;
    --site-panel: #ffffff;
    --site-text: #1d1d1f;
    --site-muted: #6e6e73;
    --site-border: #e8e8ed;
    --site-link: #0066cc;
    --site-link-hover: #004c99;
  }

  html[data-theme="dark"] {
    --site-bg: #000000;
    --site-panel: #111111;
    --site-text: #f5f5f7;
    --site-muted: #a1a1a6;
    --site-border: #2c2c2e;
    --site-link: #8ab4f8;
    --site-link-hover: #c8ddff;
  }

  html,
  body {
    background: var(--site-bg) !important;
  }

  body {
    color: var(--site-text) !important;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif !important;
    -webkit-font-smoothing: antialiased;
  }

  .masthead {
    position: sticky !important;
    top: 0;
    z-index: 20;
    min-height: 56px !important;
    height: auto !important;
    background: rgba(251, 251, 253, 0.86) !important;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08) !important;
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    backdrop-filter: saturate(180%) blur(18px);
  }

  html[data-theme="dark"] .masthead {
    background: rgba(0, 0, 0, 0.78) !important;
    border-bottom-color: rgba(255, 255, 255, 0.16) !important;
  }

  .masthead__inner-wrap {
    max-width: 1160px !important;
    margin: 0 auto !important;
    padding: 0 24px !important;
  }

  .apple-nav {
    min-height: 56px;
    display: flex !important;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .apple-nav__brand {
    color: var(--site-text) !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    line-height: 1.3 !important;
    white-space: nowrap;
    text-decoration: none !important;
  }

  .apple-nav__links {
    display: flex !important;
    align-items: center;
    justify-content: flex-end;
    gap: 22px;
    margin-left: auto;
    font-size: 13px !important;
  }

  .apple-nav__links a {
    color: var(--site-text) !important;
    line-height: 30px;
    white-space: nowrap;
    text-decoration: none !important;
  }

  .apple-nav__brand:hover,
  .apple-nav__links a:hover {
    color: var(--site-link) !important;
  }

  .site-control {
    display: inline-flex !important;
    align-items: center;
    justify-content: center;
    position: static !important;
    min-height: 28px !important;
    padding: 0 12px !important;
    color: var(--site-text) !important;
    background: var(--site-panel) !important;
    border: 1px solid var(--site-border) !important;
    border-radius: 999px !important;
    font-size: 12px !important;
    line-height: 1 !important;
    cursor: pointer;
  }

  #main {
    max-width: 1160px !important;
    margin: 0 auto !important;
    padding: 48px 24px 64px !important;
    display: grid !important;
    grid-template-columns: 180px minmax(0, 820px) !important;
    gap: 64px !important;
    align-items: start !important;
  }

  #main .sidebar {
    grid-column: 1 !important;
    width: auto !important;
    max-width: 180px !important;
    padding: 0 !important;
    float: none !important;
  }

  #main .archive,
  #main .page {
    grid-column: 2 !important;
    width: auto !important;
    max-width: 820px !important;
    padding: 0 !important;
    float: none !important;
  }

  .page__inner-wrap {
    max-width: 820px !important;
  }

  .author__avatar img {
    max-width: 112px !important;
    border: 0 !important;
    box-shadow: none !important;
  }

  .author__name {
    color: var(--site-text) !important;
    font-size: 17px !important;
    font-weight: 700 !important;
    line-height: 1.25 !important;
  }

  .author__bio,
  .sidebar p,
  .sidebar li {
    color: var(--site-muted) !important;
    font-size: 14px !important;
    line-height: 1.55 !important;
  }

  .author__urls-wrapper button {
    display: none !important;
  }

  .author__urls {
    display: grid !important;
    gap: 7px !important;
    margin-top: 14px !important;
  }

  .author__urls a {
    color: var(--site-muted) !important;
    text-decoration: none !important;
  }

  .home-hero {
    padding: 6px 0 40px !important;
  }

  .home-identity {
    margin-bottom: 30px !important;
    color: var(--site-muted) !important;
    font-size: 14px !important;
  }

  .home-eyebrow {
    color: var(--site-muted) !important;
    font-size: 13px !important;
    font-weight: 700 !important;
    letter-spacing: 0.08em !important;
    text-transform: uppercase !important;
  }

  .home-hero h1 {
    max-width: 780px !important;
    margin: 0 !important;
    color: var(--site-text) !important;
    font-size: 42px !important;
    line-height: 1.08 !important;
    letter-spacing: 0 !important;
  }

  .home-lead {
    max-width: 760px !important;
    margin-top: 20px !important;
    color: var(--site-muted) !important;
    font-size: 20px !important;
    font-weight: 400 !important;
    line-height: 1.55 !important;
  }

  .page__title {
    color: var(--site-text) !important;
    font-size: 34px !important;
    letter-spacing: 0 !important;
  }

  .cv-viewer iframe {
    width: 100% !important;
    min-height: 78vh !important;
  }

  @media screen and (min-width: 901px) {
    #main .sidebar {
      position: sticky !important;
      top: 88px !important;
    }
  }

  @media screen and (max-width: 900px) {
    #main {
      padding: 34px 24px 56px !important;
      grid-template-columns: 1fr !important;
      gap: 32px !important;
    }

    #main .sidebar,
    #main .archive,
    #main .page {
      grid-column: 1 !important;
      max-width: none !important;
    }

    #main .sidebar {
      display: grid !important;
      grid-template-columns: 82px minmax(0, 1fr) !important;
      gap: 18px !important;
      align-items: center !important;
    }

    .author__avatar,
    .author__avatar img {
      width: 82px !important;
      max-width: 82px !important;
      margin: 0 !important;
    }

    .author__urls-wrapper {
      grid-column: 1 / -1 !important;
    }

    .author__urls {
      grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      gap: 6px 18px !important;
    }

    .home-hero h1 {
      font-size: 34px !important;
    }

    .home-lead {
      font-size: 18px !important;
    }
  }

  @media screen and (max-width: 600px) {
    .masthead__inner-wrap {
      padding: 0 18px !important;
    }

    .apple-nav {
      min-height: 64px;
      align-items: flex-start;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      padding: 10px 0;
    }

    .apple-nav__brand {
      width: 100%;
      font-size: 15px !important;
    }

    .apple-nav__links {
      width: 100%;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 8px 16px;
    }

    #main {
      padding: 28px 18px 54px !important;
    }

    #main .sidebar {
      grid-template-columns: 64px minmax(0, 1fr) !important;
      gap: 14px !important;
    }

    .author__avatar,
    .author__avatar img {
      width: 64px !important;
      max-width: 64px !important;
    }

    .author__name {
      font-size: 18px !important;
    }

    .author__bio {
      font-size: 14px !important;
    }

    .author__urls {
      display: none !important;
    }

    .home-identity {
      margin-bottom: 22px !important;
    }

    .home-hero h1 {
      font-size: 28px !important;
    }

    .home-lead {
      font-size: 16px !important;
    }

    .page__title {
      font-size: 30px !important;
    }
  }
</style>

<script>
  (function() {
    var theme = localStorage.getItem("site-theme") || "light";
    document.documentElement.setAttribute("data-theme", theme);
  })();

  document.addEventListener("DOMContentLoaded", function() {
    var root = document.documentElement;
    var themeButton = document.querySelector("[data-theme-toggle]");

    function syncButtons() {
      var theme = root.getAttribute("data-theme") || "light";
      if (themeButton) themeButton.textContent = theme === "dark" ? "Light" : "Dark";
    }

    if (themeButton) {
      themeButton.addEventListener("click", function() {
        var nextTheme = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", nextTheme);
        localStorage.setItem("site-theme", nextTheme);
        syncButtons();
      });
    }

    syncButtons();
  });
</script>

<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- end custom head snippets -->
